name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Share the problem you want solved. Implementation ideas are welcome but optional.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What friction does this remove for photographers or models?
      placeholder: I need to export releases in bulk after a full-day shoot…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working in the app
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you tried
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Form / UX
        - Signature pad
        - PDF export
        - Location / metadata
        - Storage / history
        - Cloud sync (future)
        - Legal template
        - Docs / tooling
        - Other
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar requests
          required: true
